<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">若松町の風景</title>
  <desc id="desc">山と住宅と公園を描いたイラスト</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8e0ff"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86c790"/>
      <stop offset="100%" stop-color="#66ab73"/>
    </linearGradient>
  </defs>
  <rect width="640" height="420" fill="url(#sky)"/>
  <circle cx="90" cy="90" r="38" fill="#ffd56a"/>
  <path d="M0 260 C140 170, 250 175, 360 260 L0 260 Z" fill="url(#hill)"/>
  <path d="M220 280 C340 190, 470 190, 640 280 L640 420 L220 420 Z" fill="#75b481"/>
  <rect x="0" y="300" width="640" height="120" fill="#d4ebd7"/>
  <g fill="#fefefe" stroke="#8fa6bf" stroke-width="3">
    <rect x="90" y="230" width="110" height="90" rx="6"/>
    <rect x="245" y="210" width="135" height="110" rx="8"/>
    <rect x="420" y="240" width="120" height="80" rx="6"/>
  </g>
  <g fill="#c86a5a">
    <polygon points="80,230 145,185 210,230"/>
    <polygon points="235,210 312,155 389,210"/>
    <polygon points="410,240 480,195 550,240"/>
  </g>
  <rect x="292" y="258" width="42" height="62" fill="#95afcc"/>
  <circle cx="560" cy="258" r="24" fill="#5aa46f"/>
  <circle cx="539" cy="282" r="20" fill="#4d9462"/>
  <circle cx="580" cy="283" r="18" fill="#4d9462"/>
</svg>
