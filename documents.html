<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>回覧板・資料室 | 若松町町内会ポータル</title>
    <meta name="description" content="Google Driveフォルダ連携を想定した回覧板・資料室ページです。">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="documents">
    <div class="container">
        <header class="site-header">
            <div class="logo"><span>🌲</span> 若松町内会</div>
            <button class="menu-toggle" type="button" aria-label="メニューを開く">☰</button>
            <nav class="global-nav">
                <ul>
                    <li><a href="index.html" class="nav-link">ホーム</a></li>
                    <li><a href="events.html" class="nav-link">行事予定</a></li>
                    <li><a href="equipment.html" class="nav-link">備品予約</a></li>
                    <li><a href="map.html" class="nav-link">地域マップ</a></li>
                    <li><a href="disaster.html" class="nav-link">防災情報</a></li>
                    <li><a href="documents.html" class="nav-link">回覧板・資料室</a></li>
                    <li><a href="gallery.html" class="nav-link">写真アルバム</a></li>
                    <li><a href="admin.html" class="nav-link">管理ページ</a></li>
                </ul>
            </nav>
        </header>

        <main class="section-stack">
            <section class="page-title card">
                <h1>回覧板・資料室</h1>
                <p>現時点ではモックデータ表示です。将来的に Google Drive API 連携に置き換え可能な構成です。</p>
            </section>

            <section class="card">
                <h2>資料の絞り込み</h2>
                <div class="filter-bar">
                    <label class="filter-field">
                        <span>表示対象</span>
                        <select id="docs-source-filter">
                            <option value="all">すべて</option>
                            <option value="circular">回覧板</option>
                            <option value="other">その他資料</option>
                        </select>
                    </label>
                    <label class="filter-field search-field">
                        <span>キーワード検索</span>
                        <input id="docs-search" type="search" placeholder="資料名を検索">
                    </label>
                </div>
            </section>

            <section id="documents-root" class="section-stack"></section>
            <p id="docs-empty" class="note hidden">条件に一致する資料がありません。</p>
        </main>

        <footer class="site-footer">
            <p>&copy; 2026 若松町町内会ポータルサイト</p>
        </footer>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
