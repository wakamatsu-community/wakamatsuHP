name: Sync Google Calendar to GitHub Pages

on:
  schedule:
    - cron: '0 21 * * *' # 日本時間の毎朝6時に自動実行
  workflow_dispatch:     # GitHubの画面から手動で実行できるようにする設定
  push:
    branches:
      - main             # コードをGitHubにアップ（push）した時にも自動実行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dotenv

    - name: Run fetch script
      env:
        # 🟢 GitHubシークレットをプログラムの環境変数に自動注入します
        GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
        GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      run: python fetch_calendar.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/events.json
        # 変更がある場合のみコミットしてプッシュする（無限ループ防止）
        git diff --cached --quiet || (git commit -m "Automated Calendar Update [skip ci]" && git push)




